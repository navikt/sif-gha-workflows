name: SIF Code Scan
description: Scans repository for sensitive data like Norwegian national identity numbers (fødselsnummer). Only FNR from the bundled fiktive_fnr_*.txt lists are allowed.

runs:
  using: "composite"
  steps:
    - name: Scan for sensitive data
      shell: bash
      run: python3 ${{ github.action_path }}/scan.py
