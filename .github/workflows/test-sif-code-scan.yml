name: Test sif-code-scan
on:
  push:
    paths:
      - '.github/actions/sif-code-scan/**'
      - 'tests/sif-code-scan/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6.3.0
        with:
          node-version: 24
      - name: Run tests
        working-directory: .github/actions/sif-code-scan
        run: npm ci --ignore-scripts && npm test
