name: Tester saksbehandling - v2 (reusable)
permissions:
  contents: read
  packages: read
  id-token: write
on:
  workflow_call:
    inputs:
      tag:
        type: string
        description: "Docker tag (from repository) - deprecated, use image_version"
        required: true
      suites:
        type: string
        description: "komma-separert liste med test-suiter som skal kjøres (default alle): pleiepenger, livetssluttfase, annet, klage, tilbake, frontend, frontend-los, frontend-ung, ung, ung-tilbake, aktivitetspenger, beregning, pleiepenger-samtidiguttak, pleiepenger-gamle-regler-uttak, pleiepenger-pleietrengende, pleiepenger-soker, opplaeringspenger, punsj"
        required: false
        default: "pleiepenger,livetssluttfase,annet,klage,tilbake,frontend,frontend-los,frontend-ung,ung,ung-tilbake,beregning,pleiepenger-samtidiguttak,pleiepenger-gamle-regler-uttak,pleiepenger-pleietrengende,pleiepenger-soker,opplaeringspenger,punsj"
      override_image_artifact_name:
        type: string
        required: false
        description: "Artifact name of docker image to download and load."
      image_version:
        type: string
        required: true
        description: "Version/tag of image. "
      k9-verdikjede-sha:
        type: string
        required: false
        default: "master"
        description: "branch, tag or sha of k9-verdikjede to checkout"

jobs:
  # Filtrerer ut suite som skal velges i matrix kjøringen. Vanlig måte er å bruke if i matrix jobben, men det spinner opp cluster så bruker denne workarouden.
  filter_suites:
    env:
      SUITES: |
        [
          {
            "suite": "pleiepenger-pleietrengende",
            "title": "Pleiepenger pleietrengende",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=pleiepenger-pleietrengende '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "pleiepenger-soker",
            "title": "Pleiepenger søker",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=pleiepenger-soker '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "pleiepenger-samtidiguttak",
            "title": "Pleiepenger samtidig uttak",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=pleiepenger-samtidiguttak '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "pleiepenger-gamle-regler-uttak",
            "title": "Pleiepenger gamle regler uttak",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger-overgang-nye-regler.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=pleiepenger-gamle-regler-uttak '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "beregning",
            "title": "Beregning",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=beregning '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "pleiepenger",
            "title": "Pleiepenger",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=pleiepenger '-Dtest=!PleiepengerLoggTest'",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "livetssluttfase",
            "title": "Livets sluttfase",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml",
            "test_groups": "-Dgroups=livetssluttfase",
            "log_groups": "-Dgroups=etter-livetssluttfase"
          },
          {
            "suite": "klage",
            "title": "Klage",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-klage.yml -f docker-compose-testsuites/gha/docker-compose-klage-gha.yml ",
            "test_groups": "-Dgroups=klage ",
            "log_groups": "-Dgroups=etter"
          },
          {
            "suite": "annet",
            "title": "Omsorgspenger og annet",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-omsorgspenger.yml -f docker-compose-testsuites/gha/docker-compose-omsorgspenger-gha.yml",
            "test_groups": "-DexcludedGroups=frontendtest,frontendtest-los,frontendtest-ung,pleiepenger,beregning,pleiepenger-soker,pleiepenger-gamle-regler-uttak,pleiepenger-samtidiguttak,pleiepenger-pleietrengende,livetssluttfase,klage,tilbakekreving,ung,ung-tilbake,opplaeringspenger,etter-frontendtest,etter-pleiepenger,etter-livetssluttfase,etter-tilbakekreving,etter,frontend-data-generator,punsj,aktivitetspenger",
            "log_groups": "-Dgroups=etter"
          },
          {
            "suite": "tilbake",
            "title": "Tilbakekreving",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-tilbake.yml -f docker-compose-testsuites/gha/docker-compose-tilbake-gha.yml",
            "test_groups": "-Dgroups=tilbakekreving ",
            "log_groups": "-Dgroups=etter-tilbakekreving "
          },
          {
            "suite": "frontend",
            "title": "Frontend",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-frontend.yml -f docker-compose-testsuites/gha/docker-compose-frontend-gha.yml",
            "test_groups": "-Dgroups=frontendtest ",
            "log_groups": "-Dgroups=etter-frontendtest "
          },
          {
            "suite": "frontend-los",
            "title": "Frontend Los",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-frontend-los.yml -f docker-compose-testsuites/gha/docker-compose-frontend-los-gha.yml",
            "test_groups": "-Dgroups=frontendtest-los ",
            "log_groups": "-Dgroups=etter-frontendtest "
          },
          {
            "suite": "frontend-ung",
            "title": "Frontend Ung",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-frontend-ung.yml -f docker-compose-testsuites/gha/docker-compose-frontend-ung-gha.yml",
            "test_groups": "-Dgroups=frontendtest-ung ",
            "log_groups": "-Dgroups=etter-frontendtest "
          },
          {
            "suite": "ung",
            "title": "Ungdomsprogramytelsen",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-ung.yml -f docker-compose-testsuites/gha/docker-compose-ung-gha.yml ",
            "test_groups": "-Dgroups=ung",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
         {
            "suite": "ung-tilbake",
            "title": "Ungdomsprogramytelsen - tilbakekreving",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-ung.yml -f docker-compose-testsuites/gha/docker-compose-ung-gha.yml ",
            "test_groups": "-Dgroups=ung-tilbake",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "fordel",
            "title": "Fordel",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=med-k9-fordel",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "opplaeringspenger",
            "title": "Opplæringspenger",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger-gha.yml ",
            "test_groups": "-Dgroups=opplaeringspenger",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "punsj",
            "title": "Punsj",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-punsj.yml -f docker-compose-testsuites/gha/docker-compose-punsj-gha.yml ",
            "test_groups": "-Dgroups=punsj",
            "log_groups": "-Dgroups=etter-pleiepenger"
          },
          {
            "suite": "aktivitetspenger",
            "title": "Aktivitetspenger",
            "docker_compose_f": "-f docker-compose-testsuites/docker-compose-ung.yml -f docker-compose-testsuites/gha/docker-compose-ung-gha.yml ",
            "test_groups": "-Dgroups=aktivitetspenger",
            "log_groups": "-Dgroups=etter-pleiepenger"
          }
        ]
    name: Avgjør testsuiter som skal kjøres
    runs-on: ubuntu-latest
    outputs:
      active_suites: ${{ steps.filterstep.outputs.filtered }}
      start_epoch: ${{ steps.filterstep.outputs.start_epoch }}
    steps:
      - id: filterstep
        run: |
          filtered_json=$(echo $SUITES | jq -c --arg suites "${{inputs.suites}}" '[.[] | select(.suite as $suite | ($suites | split(",") | index($suite)) != null)]' )  >> $GITHUB_OUTPUT
          echo "active suites:"
          echo $filtered_json
          echo "filtered=$filtered_json" >> $GITHUB_OUTPUT
          echo "start_epoch=$(date +%s)" >> $GITHUB_OUTPUT

  run_tests:
    name: Tests
    runs-on: ${{ (github.ref_name == github.event.repository.default_branch && 'ubuntu-latest-8-cores' || 'ubuntu-latest-4-cores') }}
    needs: filter_suites
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suites: ${{ fromJson(needs.filter_suites.outputs.active_suites) }}
    steps:
      - uses: actions/create-github-app-token@v3
        id: get-token
        with:
          app-id: ${{ secrets.SIF_TOKEN_GENERATOR_APP_ID }}
          private-key: ${{ secrets.SIF_TOKEN_GENERATOR_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: navikt/sif-gha-workflows/.github/actions/maven/verdikjede-test-v2@feilede-test-oversikt
        id: verdikjede-action
        with:
          test_suite: ${{ matrix.suites.suite }}
          test_groups: ${{ matrix.suites.test_groups }}
          log_groups: ${{ matrix.suites.log_groups }}
          docker_compose_f: ${{ matrix.suites.docker_compose_f }}
          override_image_artifact_name: ${{ inputs.override_image_artifact_name }}
          image_version: ${{ inputs.image_version }}
          timeout_test_increase: ${{ github.ref_name != github.event.repository.default_branch && '60' || '0' }}
          k9-verdikjede-sha: ${{ inputs.k9-verdikjede-sha }}
          # Composite actions arver ikke secrets så vi må få dem in som input
          cloning_token: ${{ steps.get-token.outputs.token }}
          reader_token: ${{ secrets.READER_TOKEN }}
      - name: Laster opp suite-resultat
        if: always() && !cancelled()
        run: |
          mkdir -p suite-result
          content="${{ matrix.suites.title }}|${{ steps.verdikjede-action.outputs.test_result }}"
          echo "$content" > suite-result/${{ matrix.suites.suite }}.txt
          echo "suite-result/${{ matrix.suites.suite }}.txt: $content"
      - uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: suite-result-${{ matrix.suites.suite }}
          path: suite-result/
          retention-days: 1
          if-no-files-found: error

  slack:
    name: Sender slack melding
    if: ${{ always() && !cancelled() }}
    needs: [run_tests, filter_suites]
    runs-on: ubuntu-latest
    steps:
      - name: Laster ned suite-resultater
        uses: actions/download-artifact@v4
        with:
          pattern: suite-result-*
          path: all-suite-results/
          merge-multiple: false
      - name: Bygger opp og sender slack melding
        run: |
          start_epoch="${{ needs.filter_suites.outputs.start_epoch }}"
          end_epoch=$(date +%s)
          elapsed=$(( end_epoch - start_epoch ))
          total_duration=$(printf "%dm%02ds" $((elapsed/60)) $((elapsed%60)))

          all_success=true
          slack_lines=""

          for file in all-suite-results/suite-result-*/*.txt; do
            [ -f "$file" ] || continue
            result=$(cat "$file")
            title="${result%%|*}"
            rest="${result#*|}"
            status="${rest%%|*}"
            varighet=""
            [[ "$rest" == *"|"* ]] && varighet=" (${rest#*|})"
            if [[ "$status" != success ]]; then
              all_success=false
            fi
            if [[ "$status" == success ]]; then
              slack_lines+=":heavy_check_mark:  ${title}${varighet}"$'\n'
            else
              slack_lines+=":x:  ${title}${varighet}"$'\n'
            fi
          done

          if [[ "$all_success" == true ]]; then
            title="Verdikjede er kjørt UTEN feil :rocket:"
          else
            title="Verdikjede er brukket :boom:"
          fi

          slack_lines+="*Actor*: ${{ github.actor }}"$'\n'
          slack_lines+="*Trigger*: ${{ github.repository }}:${{ inputs.tag }}"$'\n'
          slack_lines+="*Trigger action*: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Trigger action ${{ github.run_id }}>"$'\n'
          slack_lines+="*Total test duration*: ${total_duration}"

          payload=$(jq -n \
            --arg title "$title" \
            --arg msg "$slack_lines" \
            '{
              "blocks": [
                {"type": "header", "text": {"type": "plain_text", "text": $title}},
                {"type": "section", "text": {"type": "mrkdwn", "text": $msg}}
              ]
            }')
          echo "=== Payload ==="
          echo "$payload"
          curl -X POST -H 'Content-type: application/json' --data "$payload" ${{ secrets.SLACKBOT_WEBHOOK }}

  slack-testdetaljer:
    name: Sender testdetaljer til Slack
    if: ${{ always() && !cancelled() && needs.run_tests.result == 'failure' }}
    needs: [run_tests]
    runs-on: ubuntu-latest
    steps:
      - name: Laster ned testdetaljer
        uses: actions/download-artifact@v4
        with:
          pattern: test-details-*
          path: all-test-details/
          merge-multiple: false
      - name: Bygger opp slack melding
        run: |
          message=""
          for file in all-test-details/test-details-*/*.txt; do
            [ -f "$file" ] || continue
            tests=$(sed '/^$/d' "$file")
            if [ -n "$tests" ]; then
              while IFS= read -r test; do
                if [[ "$test" =~ \([0-9]+s\)$ ]]; then
                  message+=":turtle: ${test}"$'\n'
                else
                  message+=":x: ${test}"$'\n'
                fi
              done <<< "$tests"
            fi
          done

          if [ -z "$message" ]; then
            echo "Ingen feilende tester å rapportere."
            echo "SKIP_SLACK=true" >> $GITHUB_ENV
            exit 0
          fi

          message+="<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|:link: Se kjøring>"

          echo 'SLACK_FAILED_TESTS_MESSAGE<<SLACK_EOF' >> $GITHUB_ENV
          echo "$message" >> $GITHUB_ENV
          echo 'SLACK_EOF' >> $GITHUB_ENV

      - name: Sender Slack-melding med feilende tester
        if: env.SKIP_SLACK != 'true'
        run: |
          payload=$(jq -n \
            --arg msg "$SLACK_FAILED_TESTS_MESSAGE" \
            '{
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": $msg
                  }
                }
              ]
            }')
          echo "=== Payload ==="
          echo "$payload"
          webhook="${{ secrets.SLACKBOT_WEBHOOK_TEST_DETAILS }}"
          if [ -z "$webhook" ]; then
            echo "SLACKBOT_WEBHOOK_TEST_DETAILS ikke satt, hopper over Slack-melding."
            exit 0
          fi
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$webhook"
