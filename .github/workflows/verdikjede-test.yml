name: Tester saksbehandling (reusable)
on:
  workflow_call:
    inputs:
      tag:
        type: string
        description: 'Docker tag (from repository)'
        required: true
      frontend_only:
        type: string
        description: 'Kun kjør frontend tester'
        required: false
        default: 'false'
      suites:
        type: string
        description: 'komma-separert liste med test-suiter som skal kjøres (default alle): pleiepenger, annet, klage, tilbake, frontend, frontend-los.'
        required: false
        default: "pleiepenger, livetssluttfase, annet, klage, tilbake, frontend, frontend-los"
    outputs:
      pleiepenger: 
            description: "Utfall fra pleiepenger-test"
            value: ${{ jobs.run_tests.outputs.pleiepenger }}
      livetssluttfase:
            description: "Utfall fra livetssluttfase-test"
            value: ${{ jobs.run_tests.outputs.livetssluttfase }}
      annet:
            description: "Utfall fra annet-test"
            value: ${{ jobs.run_tests.outputs.annet }}
      frontend: 
            description: "Utfall fra frontend-test"
            value: ${{ jobs.run_tests.outputs.frontend }}
      klage:
        description: "Utfall fra klage-test"
        value: ${{ jobs.run_tests.outputs.klage }}
      tilbake:
        description: "Utfall fra tilbake-test"
        value: ${{ jobs.run_tests.outputs.tilbake }}

env:
  SUITES: |
    [
      {
        "suite": "pleiepenger",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger.yml ",
        "test_groups": "-Dgroups=pleiepenger '-Dtest=!PleiepengerLoggTest'",
        "log_groups": "-Dgroups=etter-pleiepenger"
      },
      {
        "suite": "livetssluttfase",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-pleiepenger.yml -f docker-compose-testsuites/gha/docker-compose-pleiepenger.yml",
        "test_groups": "-Dgroups=livetssluttfase",
        "log_groups": "-Dgroups=etter-livetssluttfase"
      },
      {
        "suite": "klage",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-klage.yml -f docker-compose-testsuites/gha/docker-compose-klage.yml ",
        "test_groups": "-Dgroups=klage ",
        "log_groups": "-Dgroups=etter"
      },
      {
        "suite": "annet",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-omsorgspenger.yml -f docker-compose-testsuites/gha/docker-compose-omsorgspenger.yml",
        "test_groups": "-DexcludedGroups=frontendtest,frontendtest-los,pleiepenger,livetssluttfase,klage,tilbakekreving,etter-frontendtest,etter-pleiepenger,etter-livetssluttfase,etter-tilbakekreving,etter",
        "log_groups": "-Dgroups=etter"
      },
      {
        "suite": "tilbake",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-tilbake.yml -f docker-compose-testsuites/gha/docker-compose-tilbake.yml",
        "test_groups": "-Dgroups=tilbakekreving ",
        "log_groups": "-Dgroups=etter-tilbakekreving "
      },
      {
        "suite": "frontend",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-frontend.yml -f docker-compose-testsuites/gha/docker-compose-frontend.yml",
        "test_groups": "-Dgroups=frontendtest ",
        "log_groups": "-Dgroups=etter-frontendtest "
      },
      {
        "suite": "frontend-los",
        "docker_compose_f": "-f docker-compose-testsuites/docker-compose-frontend-los.yml -f docker-compose-testsuites/gha/docker-compose-frontend-los.yml",
        "test_groups": "-Dgroups=frontendtest-los ",
        "log_groups": "-Dgroups=etter "
      }
    ]


jobs:
  filter_suites:
    name: Filter tests
    runs-on: ubuntu-latest
    outputs:
      active_suites: ${{ steps.filterstep.outputs.filtered }}
    steps:
      - id: filterstep
        run: |
          active_suites=$(echo $SUITES | jq -c --arg suites "${{inputs.suites}}" '[.[] | select(.suite as $suite | ($suites | split(",") | index($suite)) != null)]' )  >> $GITHUB_OUTPUT
          echo "active suites:"
          echo $active_suites
          echo "filtered=$active_suites" >> $GITHUB_OUTPUT

  get_output:
    name: test
    needs: filter_suites
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "${{ needs.filter_suites.outputs.active_suites }}"
          echo "${{ fromJson(needs.filter_suites.outputs.active_suites) }}"
  run_tests:
    name: Tests
    runs-on: ubuntu-latest-8-cores
    needs: filter_suites
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suites: ${{ fromJson(needs.filter_suites.outputs.active_suites) }}
    outputs:
      pleiepenger: ${{ steps.verdikjede-action.outputs.test_result_pleiepenger }}
      klage: ${{ steps.verdikjede-action.outputs.test_result_klage }}
      livetssluttfase: ${{ steps.livetssluttfase.outputs.test_result_livetssluttfase }}
      annet: ${{ steps.annet.outputs.test_result_annet}}
      tilbake: ${{ steps.annet.outputs.test_result_tilbake }}
      frontend: ${{ steps.annet.outputs.test_result_frontend }}
      frontend-los: ${{ steps.annet.outputs.test_result_frontend_los }}
    steps:
      - uses: navikt/sif-gha-workflows/.github/actions/maven/verdikjede-test@verdikjede-stacks
        id: verdikjede-action
        if: contains(inputs.suites, matrix.suites.suite)
        with:
          test_suite: ${{ matrix.suites.suite }}
          test_groups: ${{ matrix.suites.test_groups }}
          log_groups: ${{ matrix.suites.log_groups }}
          docker_compose_f: ${{ matrix.suites.docker_compose_f }}
          # Composite actions arver ikke secrets så vi må få dem in som input
          github-token: ${{ secrets.GITHUB_TOKEN }}
          reader-token: ${{ secrets.READER_TOKEN }}
          nais-management-project-id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          nais-workload-identity-provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}


  run_frontend_tests:
    name: Frontend Tests
    if: false
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 30
    outputs:
      frontend: ${{ steps.test.outputs.test_result }}
    steps:
      - uses: navikt/sif-gha-workflows/.github/actions/maven/verdikjede-frontend-test@main
        id: test
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          reader-token: ${{ secrets.READER_TOKEN }}
          nais-management-project-id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          nais-workload-identity-provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}

  slack:
    name: Sender slack melding
    if: false
    needs: [run_tests, run_frontend_tests]
    runs-on: ubuntu-latest
    steps:
      - name: Bygger opp slack melding
        run: |
          pleiepenger=$([ "${{ inputs.frontend_only }}" == 'true' ] && echo 'skipped' || echo "${{ needs.run_tests.outputs.pleiepenger }}")
          livetssluttfase=$([ "${{ inputs.frontend_only }}" == 'true' ] && echo 'skipped' || echo "${{ needs.run_tests.outputs.livetssluttfase }}")
          annet=$([ "${{ inputs.frontend_only }}" == 'true' ] && echo 'skipped' || echo "${{ needs.run_tests.outputs.annet }}")
          frontend=${{ needs.run_frontend_tests.outputs.frontend }}
  
          title="Verdikjede er "
          all_success=true

          test_results=("$pleiepenger" "$livetssluttfase" "$annet" "$frontend")
          for result in "${test_results[@]}"; do
            if [[ "$result" != 'success' && "$result" != 'skipped' ]]; then
              all_success=false
              break
            fi
          done
  
          if [[ "$all_success" == true ]]; then
            title+="kjørt UTEN feil :rocket:"
          else
            title+="brukket :boom:"
          fi
  
          echo "SLACK_TITLE=$title" >> $GITHUB_ENV
  
          function echoStatus() {
            if [[ "$2" == 'success' ]]; then
              echo ":heavy_check_mark:  $1"
            elif [[ "$2" == 'skipped' ]]; then
              return
            else
              echo ":x:  $1"
            fi
          }
  
          echo 'SLACK_MESSAGE<<\n' >> $GITHUB_ENV
          echoStatus "Pleiepenger" $pleiepenger >> $GITHUB_ENV
          echoStatus "Livets sluttfase" $livetssluttfase >> $GITHUB_ENV
          echoStatus "Frontend" $frontend >> $GITHUB_ENV
          echoStatus "Omsorgspenger og annet" $annet >> $GITHUB_ENV
          echo '*Actor*: ${{ github.actor }}' >> $GITHUB_ENV
          echo '*Trigger*: ${{ github.repository }}:${{ inputs.tag }}' >> $GITHUB_ENV
          echo '*Trigger action*: <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Trigger action ${{ github.run_id }}>' >> $GITHUB_ENV
          echo '\n' >> $GITHUB_ENV
        # https://api.slack.com/block-kit
      - name: Slack Notification
        run: >
          curl -X POST
          -H 'Content-type: application/json'
          --data '{"blocks": [
            {
              "type": "header",
              "text": {"type": "plain_text", "text": "${{ env.SLACK_TITLE }}"}
            },
            {
              "type": "section",
              "text": {"type": "mrkdwn", "text": "${{ env.SLACK_MESSAGE }}"}
            }
          ]}'
          ${{ secrets.SLACKBOT_WEBHOOK }}
