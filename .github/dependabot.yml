version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/.github/actions"
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns:
          - "*"
