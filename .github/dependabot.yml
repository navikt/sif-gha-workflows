version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/.github/actions/sif-code-scan"
    schedule:
      interval: weekly
    groups:
      npm:
        patterns:
          - "*"
